<!doctype html>
<html lang="pt-BR">
<head>Primeiro código PHP com tags HTML</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }
    label {
        display: inline-block;
        width: 100px;

    input[type="text"],
    input[type="email"],

        width: 200px;

        border-radius: 5px;
    }

<div class ="container">
 <h1>Login</h1>
